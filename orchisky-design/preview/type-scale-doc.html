<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:var(--ink-0);font-family:var(--ff-sans);font-size:13px;color:var(--ink-700)}
table{border-collapse:collapse;width:100%;font-size:13px}
th{background:#1A1A1A;color:#fff;text-align:left;padding:8px 10px;font-weight:600;font-size:12px;border-bottom:1px solid #1070F0}
td{padding:8px 10px;border-bottom:.5px solid #E2E2E2}
tr:nth-child(even) td{background:#FAFAFA}
.mono{font-family:var(--ff-mono)}
</style></head><body>
<table>
<thead><tr><th>层级</th><th>字体</th><th>字号</th><th>字重</th><th>颜色</th></tr></thead>
<tbody>
<tr><td>H1 章标题</td><td>Sans</td><td class="mono">22pt</td><td>Bold</td><td class="mono">#1A1A1A</td></tr>
<tr><td>H2 节标题</td><td>Sans</td><td class="mono">15pt</td><td>Bold</td><td class="mono">#1A1A1A</td></tr>
<tr><td>H3 小节</td><td>Sans</td><td class="mono">12pt</td><td>Bold</td><td class="mono">#555555</td></tr>
<tr><td>正文 Body</td><td>Serif</td><td class="mono">10.5pt</td><td>Regular</td><td class="mono">#333333</td></tr>
<tr><td>表格数据</td><td>Serif</td><td class="mono">9pt</td><td>Regular</td><td class="mono">#333333</td></tr>
<tr><td>说明 / Caption</td><td>Sans</td><td class="mono">8.5pt</td><td>Regular Italic</td><td class="mono">#888888</td></tr>
</tbody></table>
</body></html>
