<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Field PDA UI Kit · Orchisky Field V1.0</title>
<style>
:root{
  --blue-500:#1070F0; --ink-0:#fff; --ink-50:#FAFAFA;
  --ink-200:#E2E2E2; --ink-800:#1A1A1A;
  font-family: 'Noto Sans SC','Microsoft YaHei',sans-serif;
}
body{margin:0;padding:24px;background:#eceff3;}
.stage{display:flex;gap:24px;flex-wrap:wrap;}
.frame{display:flex;flex-direction:column;align-items:center;gap:8px;}
.label{font-size:12px;color:#888;}
.pda{width:480px;height:800px;border:1px solid #CCC;border-radius:8px;
  overflow:hidden;background:var(--ink-50);}
</style>
</head>
<body>
<h2 style="font-size:14px;color:#555;margin:0 0 16px">
Field PDA UI Kit · Orchisky Field Design System V1.0 · 主色 #1070F0
</h2>
<div class="stage">
  <div class="frame">
    <div class="pda"><div style="display:flex;flex-direction:column;height:100%;">
      <div style="height:24px;background:#1A1A1A;color:#fff;font-size:12px;font-family:monospace;display:flex;justify-content:space-between;align-items:center;padding:0 12px"><span>09:42</span><span>5G 87%</span></div>
      <div style="height:56px;background:#1070F0;display:flex;align-items:center;justify-content:space-between;padding:0 12px"><span style="color:#fff;font-size:18px;font-weight:500">Orchisky WMS</span><span style="color:#A8C8F9;font-size:12px">退出</span></div>
      <div style="padding:12px;background:#EAF2FE;border-bottom:1px solid #D0E1FC"><div style="font-size:14px;color:#074499;font-weight:500">王建国 · 仓管员</div><div style="font-size:12px;color:#555;margin-top:2px">1#原料库 · 早班</div></div>
      <div style="flex:1;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">↓</span><span>入库扫码</span></button>
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">⤒</span><span>上架</span></button>
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">⤓</span><span>拣货</span></button>
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">≡</span><span>盘点</span></button>
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">⇄</span><span>移库</span></button>
        <button style="background:#fff;border:1px solid #E2E2E2;border-radius:4px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:14px;cursor:pointer"><span style="font-size:28px;color:#1070F0">□</span><span>打印</span></button>
      </div>
    </div></div>
    <div class="label">扫码首页</div>
  </div>
</div>
</body></html>
